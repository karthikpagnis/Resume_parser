version: '3.8'

services:
  resume-parser:
    build:
      context: .
      dockerfile: Dockerfile
    
    container_name: resume-parser-api
    
    ports:
      - "5000:5000"
    
    volumes:
      - ./uploads:/app/uploads
      - ./output:/app/output
      - /app/__pycache__
    
    environment:
      - FLASK_PORT=5000
      - FLASK_HOST=0.0.0.0
      - FLASK_DEBUG=False
      - PYTHONUNBUFFERED=1
    
    command: gunicorn -w 4 -b 0.0.0.0:5000 app:app
    
    restart: unless-stopped
    
    networks:
      - resume-parser-network
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  resume-parser-network:
    driver: bridge

volumes:
  uploads:
  output:
